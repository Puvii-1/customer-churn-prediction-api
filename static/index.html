<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Churn Risk Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="page">
      <header class="page-header">
        <p class="eyebrow">Churn Risk Engine</p>
        <h1>Will this customer churn?</h1>
        <p class="subtitle">
          Enter account details to estimate risk and get a recommended action.
        </p>
      </header>

      <main class="panel-grid">
        <!-- FORM PANEL -->
        <section class="panel form-panel" aria-label="Customer details">
          <form id="churn-form">
            <div class="field-group">
              <label for="tenure_months"
                >Tenure <span class="unit">months</span></label
              >
              <input
                type="number"
                id="tenure_months"
                min="0"
                max="120"
                value="12"
                required
              />
            </div>

            <div class="field-row">
              <div class="field-group">
                <label for="monthly_charges"
                  >Monthly charges <span class="unit">$</span></label
                >
                <input
                  type="number"
                  id="monthly_charges"
                  min="0"
                  step="0.01"
                  value="65.00"
                  required
                />
              </div>
              <div class="field-group">
                <label for="total_charges"
                  >Total charges <span class="unit">$</span></label
                >
                <input
                  type="number"
                  id="total_charges"
                  min="0"
                  step="0.01"
                  value="780.00"
                  required
                />
              </div>
            </div>

            <div class="field-row">
              <div class="field-group">
                <label for="num_support_tickets">Support tickets</label>
                <input
                  type="number"
                  id="num_support_tickets"
                  min="0"
                  value="1"
                  required
                />
              </div>
              <div class="field-group">
                <label for="payment_delay_days"
                  >Avg. payment delay <span class="unit">days</span></label
                >
                <input
                  type="number"
                  id="payment_delay_days"
                  min="0"
                  step="0.1"
                  value="1.5"
                  required
                />
              </div>
            </div>

            <div class="field-group">
              <label for="contract_type">Contract type</label>
              <select id="contract_type" required>
                <option value="month-to-month">Month-to-month</option>
                <option value="one_year">One year</option>
                <option value="two_year">Two year</option>
              </select>
            </div>

            <div class="field-row toggles">
              <label class="toggle">
                <input type="checkbox" id="has_tech_support" />
                <span>Has tech support plan</span>
              </label>
              <label class="toggle">
                <input type="checkbox" id="is_senior_citizen" />
                <span>Senior citizen</span>
              </label>
            </div>

            <button type="submit" id="submit-btn">Predict risk</button>
            <p class="error-msg" id="error-msg" role="alert"></p>
          </form>
        </section>

        <!-- RESULT PANEL -->
        <section class="panel result-panel" aria-label="Prediction result">
          <div class="gauge-wrap">
            <svg
              viewBox="0 0 200 120"
              class="gauge"
              id="gauge-svg"
              aria-hidden="true"
            >
              <path d="M 20 110 A 80 80 0 0 1 180 110" class="gauge-track" />
              <path
                d="M 20 110 A 80 80 0 0 1 180 110"
                class="gauge-fill"
                id="gauge-fill"
              />
            </svg>
            <div class="gauge-readout">
              <span class="gauge-value" id="gauge-value">—</span>
              <span class="gauge-label">churn probability</span>
            </div>
          </div>

          <div class="risk-badge" id="risk-badge">
            <span class="risk-dot"></span>
            <span id="risk-badge-text">Awaiting input</span>
          </div>

          <p class="recommendation" id="recommendation">
            Fill in the account details and predict to see a risk assessment and
            recommended action.
          </p>
        </section>
      </main>

      <footer class="page-footer">
        <span
          >Model: Random Forest &middot; Trained on synthetic account data</span
        >
      </footer>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
